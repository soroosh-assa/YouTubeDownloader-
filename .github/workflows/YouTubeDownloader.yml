name: 🎯 YouTubeDownloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🎬 YouTube Video URLs (separate with commas, spaces, or new lines)'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ Quality'
        required: true
        type: choice
        options:
          - '144p'
          - '360p'
          - '480p'
          - '720p'
          - '1080p'
          - '64kbps'
          - '128kbps'
          - '192kbps'
          - '320kbps'
        default: '720p'
      split_threshold_mb:
        description: '📦 Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 90

jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq

      - name: 📋 Parse URLs
        id: parse_urls
        run: |
          # Parse URLs from input (handle commas, spaces, and new lines)
          echo "${{ github.event.inputs.urls }}" | tr ',' '\n' | tr ' ' '\n' | grep -E 'https?://' | grep -v '^$' > /tmp/urls.txt
          
          # Remove duplicates while preserving order
          awk '!seen[$0]++' /tmp/urls.txt > /tmp/unique_urls.txt
          
          TOTAL_URLS=$(wc -l < /tmp/unique_urls.txt)
          echo "total_urls=$TOTAL_URLS" >> $GITHUB_OUTPUT
          
          echo "📊 Found $TOTAL_URLS unique URL(s):"
          cat -n /tmp/unique_urls.txt

      - name: 🎯 Process All URLs
        id: process_urls
        run: |
          python3 << 'PYEOF'
          import os, sys, json, time, re
          import requests
          from pathlib import Path
          
          # ========== CONFIGURATION ==========
          OUTPUT_TYPE = os.environ['OUTPUT_TYPE']
          QUALITY = os.environ.get('QUALITY', '720p')
          
          API_ENDPOINT = "https://hub.ytconvert.org/api/download"
          STATUS_CHECK_INTERVAL = 2
          MAX_ATTEMPTS = 90
          
          # ========== SUPPORTED QUALITIES ==========
          VIDEO_QUALITIES = ['144p', '360p', '480p', '720p', '1080p']
          AUDIO_BITRATES = ['64kbps', '128kbps', '192kbps', '320kbps']
          
          # ========== READ URLS ==========
          with open('/tmp/unique_urls.txt', 'r') as f:
              urls = [line.strip() for line in f if line.strip()]
          
          if not urls:
              print("❌ No valid URLs found!")
              sys.exit(1)
          
          print(f"🎯 Processing {len(urls)} URL(s)")
          print(f"📦 Type: {OUTPUT_TYPE} | Quality: {QUALITY}")
          print(f"{'='*60}")
          
          # ========== REQUEST HEADERS ==========
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg",
          }
          
          # ========== VALIDATE QUALITY ==========
          if OUTPUT_TYPE == 'video' and QUALITY not in VIDEO_QUALITIES:
              print(f"⚠️ Invalid video quality: {QUALITY}, using 720p")
              QUALITY = '720p'
          elif OUTPUT_TYPE == 'audio' and QUALITY not in AUDIO_BITRATES:
              print(f"⚠️ Invalid audio quality: {QUALITY}, using 192kbps")
              QUALITY = '192kbps'
          
          # ========== PROCESS EACH URL ==========
          downloads = []
          failed_urls = []
          
          for idx, url in enumerate(urls, 1):
              print(f"\n{'='*60}")
              print(f"📥 [{idx}/{len(urls)}] Processing: {url}")
              print(f"{'='*60}")
              
              try:
                  # Prepare payload
                  if OUTPUT_TYPE == 'audio':
                      payload = {
                          "url": url,
                          "os": "linux",
                          "output": {
                              "type": "audio",
                              "format": "mp3"
                          },
                          "audio": {"bitrate": QUALITY}
                      }
                  else:
                      payload = {
                          "url": url,
                          "os": "linux",
                          "output": {
                              "type": "video",
                              "format": "mp4",
                              "quality": QUALITY
                          }
                      }
                  
                  # Initiate conversion
                  print(f"📤 Requesting conversion...")
                  
                  session = requests.Session()
                  session.get("https://media.ytmp3.gg/", headers=HEADERS)
                  
                  response = session.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                  
                  if response.status_code != 200:
                      print(f"❌ API Error ({response.status_code}): {response.text[:200]}")
                      failed_urls.append((url, f"HTTP {response.status_code}"))
                      continue
                  
                  data = response.json()
                  status_url = data.get('statusUrl')
                  title = data.get('title', 'youtube_video')
                  
                  if not status_url:
                      print(f"⚠️ No status URL received, skipping")
                      failed_urls.append((url, "No status URL"))
                      continue
                  
                  print(f"✅ Conversion registered: {title}")
                  
                  # Poll for completion
                  download_url = None
                  for attempt in range(MAX_ATTEMPTS):
                      time.sleep(STATUS_CHECK_INTERVAL)
                      
                      if attempt % 5 == 0:
                          print(f"🔄 Checking status [{attempt + 1}/{MAX_ATTEMPTS}]...")
                      
                      try:
                          status_resp = session.get(status_url, headers=HEADERS, timeout=15)
                          status_data = status_resp.json()
                      except Exception as e:
                          print(f"⚠️ Status check failed: {e}")
                          continue
                      
                      status = status_data.get('status')
                      progress = status_data.get('progress', 0)
                      
                      if attempt % 5 == 0:
                          print(f"   Status: {status} | Progress: {progress}%")
                      
                      if status == 'completed':
                          download_url = status_data.get('downloadUrl')
                          if download_url:
                              print("🎉 Conversion completed successfully!")
                              break
                      elif status == 'failed':
                          print("❌ Conversion failed!")
                          print(f"   Error: {status_data.get('error', 'Unknown error')}")
                          failed_urls.append((url, "Conversion failed"))
                          break
                  
                  if not download_url:
                      if (url, "Conversion failed") not in failed_urls:
                          print("⏰ Timeout - conversion took too long")
                          failed_urls.append((url, "Timeout"))
                      continue
                  
                  # Generate filename
                  video_id_match = re.search(r'(?:v=|\/)([a-zA-Z0-9_-]{11})', url)
                  video_id = video_id_match.group(1) if video_id_match else "unknown"
                  
                  safe_title = re.sub(r'[^a-zA-Z0-9\-_]', '_', title.replace(' ', '_'))
                  safe_title = safe_title[:60] if len(safe_title) > 60 else safe_title
                  safe_title = safe_title.strip('_') or video_id
                  
                  extension = "mp3" if OUTPUT_TYPE == 'audio' else "mp4"
                  quality_label = QUALITY.replace('/', '_')
                  filename = f"{safe_title}_{video_id}_{quality_label}.{extension}"
                  
                  downloads.append({
                      'url': download_url,
                      'filename': filename,
                      'title': safe_title,
                      'type': OUTPUT_TYPE,
                      'quality': QUALITY
                  })
                  
                  print(f"📄 Filename: {filename}")
                  
              except Exception as e:
                  print(f"❌ Unexpected error: {e}")
                  failed_urls.append((url, str(e)))
          
          # ========== SAVE RESULTS ==========
          with open('/tmp/downloads.json', 'w') as f:
              json.dump(downloads, f)
          
          with open('/tmp/failed.json', 'w') as f:
              json.dump(failed_urls, f)
          
          print(f"\n{'='*60}")
          print(f"📊 SUMMARY")
          print(f"{'='*60}")
          print(f"✅ Successful: {len(downloads)}")
          print(f"❌ Failed: {len(failed_urls)}")
          
          if failed_urls:
              print(f"\n❌ Failed URLs:")
              for url, reason in failed_urls:
                  print(f"   • {url[:80]}")
                  print(f"     Reason: {reason}")
          
          if not downloads:
              print("❌ No files to download!")
              sys.exit(1)
          
          print(f"\n📥 Ready to download {len(downloads)} file(s)")
          PYEOF
        env:
          OUTPUT_TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}

      - name: ⬇️ Download All Files
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys
          
          with open('/tmp/downloads.json', 'r') as f:
              downloads = json.load(f)
          
          if not downloads:
              print("❌ No files to download!")
              sys.exit(1)
          
          os.makedirs('./downloads/temp', exist_ok=True)
          
          for idx, item in enumerate(downloads, 1):
              url = item['url']
              filename = item['filename']
              
              print(f"\n{'='*60}")
              print(f"⬇️ [{idx}/{len(downloads)}] Downloading: {filename}")
              print(f"{'='*60}")
              
              cmd = [
                  'curl', '--progress-bar', '-L',
                  '-H', 'User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0',
                  '-H', 'Referer: https://media.ytmp3.gg/',
                  '-o', f'./downloads/temp/{filename}',
                  '--max-time', '300',
                  '--retry', '3',
                  '--retry-delay', '5',
                  url
              ]
              
              result = subprocess.run(cmd, capture_output=True, text=True)
              
              if os.path.exists(f'./downloads/temp/{filename}'):
                  file_size = os.path.getsize(f'./downloads/temp/{filename}')
                  size_mb = file_size / (1024 * 1024)
                  
                  if file_size > 0:
                      print(f"✅ Downloaded: {filename} ({size_mb:.1f} MB)")
                  else:
                      print(f"⚠️ File is empty: {filename}")
                      os.remove(f'./downloads/temp/{filename}')
              else:
                  print(f"❌ Download failed: {filename}")
          
          # Count successful downloads
          total_files = len([f for f in os.listdir('./downloads/temp') if os.path.isfile(os.path.join('./downloads/temp', f))])
          
          if total_files == 0:
              print("\n❌ No files were downloaded successfully!")
              sys.exit(1)
          
          print(f"\n{'='*60}")
          print(f"✅ Successfully downloaded {total_files} file(s)")
          print(f"{'='*60}")
          PYEOF

      - name: ✂️ Smart Split Large Files
        run: |
          python3 << 'PYEOF'
          import os, subprocess, glob, shutil
          
          THRESHOLD_MB = int(os.environ.get('SPLIT_THRESHOLD_MB', '0'))
          THRESHOLD_BYTES = THRESHOLD_MB * 1024 * 1024
          
          temp_dir = './downloads/temp'
          output_dir = './downloads'
          
          if not os.path.exists(temp_dir):
              print("ℹ️ No temporary files to process")
              exit(0)
          
          files = [f for f in os.listdir(temp_dir) if os.path.isfile(os.path.join(temp_dir, f))]
          
          if not files:
              print("ℹ️ No files to process")
              exit(0)
          
          print(f"📁 Processing {len(files)} file(s)...")
          print(f"📏 Split threshold: {THRESHOLD_MB} MB")
          
          for filename in files:
              filepath = os.path.join(temp_dir, filename)
              size = os.path.getsize(filepath)
              size_mb = size / (1024 * 1024)
              
              if THRESHOLD_BYTES > 0 and size > THRESHOLD_BYTES:
                  print(f"\n{'='*60}")
                  print(f"✂️ Splitting: {filename} ({size_mb:.1f} MB)")
                  print(f"   Part size: {THRESHOLD_MB} MB each")
                  
                  # Move file to output directory first
                  dest_path = os.path.join(output_dir, filename)
                  shutil.move(filepath, dest_path)
                  
                  # Create split zip from the output directory
                  zip_base = os.path.join(output_dir, f"{filename}.zip")
                  
                  # Change to output directory to run zip command
                  original_cwd = os.getcwd()
                  os.chdir(output_dir)
                  
                  try:
                      cmd = ['zip', '-r', '-s', f'{THRESHOLD_MB}m', f"{filename}.zip", filename]
                      print(f"   Running: {' '.join(cmd)}")
                      
                      result = subprocess.run(cmd, check=True, capture_output=True, text=True)
                      
                      # Remove the original file after successful split
                      os.remove(filename)
                      
                      # Count and display parts
                      parts = sorted(glob.glob(f'{filename}.z*'))
                      print(f"✅ Created {len(parts)} part(s):")
                      for part in parts:
                          part_size = os.path.getsize(part) / (1024 * 1024)
                          print(f"   • {part} ({part_size:.1f} MB)")
                      
                  except subprocess.CalledProcessError as e:
                      print(f"❌ Split failed: {e}")
                      print(f"   stdout: {e.stdout}")
                      print(f"   stderr: {e.stderr}")
                      # Keep the original file if split fails
                      print(f"   ℹ️ Keeping original file: {filename}")
                  finally:
                      os.chdir(original_cwd)
                  
              else:
                  if THRESHOLD_BYTES == 0:
                      print(f"📁 {filename} ({size_mb:.1f} MB) — split disabled")
                  else:
                      print(f"📁 {filename} ({size_mb:.1f} MB) — under threshold")
                  
                  # Move to downloads folder
                  shutil.move(filepath, os.path.join(output_dir, filename))
          
          # Clean up temp directory
          if os.path.exists(temp_dir) and not os.listdir(temp_dir):
              shutil.rmtree(temp_dir)
          
          # List final files
          print(f"\n{'='*60}")
          print(f"📂 Final files in {output_dir}:")
          final_files = [f for f in os.listdir(output_dir) 
                        if os.path.isfile(os.path.join(output_dir, f))]
          for f in sorted(final_files):
              size = os.path.getsize(os.path.join(output_dir, f))
              size_mb = size / (1024 * 1024)
              print(f"  • {f} ({size_mb:.1f} MB)")
          
          print(f"\n✅ {len(final_files)} file(s) ready to upload")
          PYEOF
        env:
          SPLIT_THRESHOLD_MB: ${{ github.event.inputs.split_threshold_mb }}
      - name: 📤 Commit and Push to Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all downloaded files
          git add ./downloads/
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          # Get list of staged files
          mapfile -t STAGED_FILES < <(git diff --staged --name-only)
          TOTAL_FILES=${#STAGED_FILES[@]}
          
          echo "📦 Found $TOTAL_FILES file(s) to upload"
          
          # Unstage everything first for batch processing
          git reset HEAD ./downloads/
          
          BATCH_SIZE=5
          for (( i=0; i<TOTAL_FILES; i+=BATCH_SIZE )); do
            BATCH_NUM=$((i / BATCH_SIZE + 1))
            END=$((i + BATCH_SIZE))
            [[ $END -gt $TOTAL_FILES ]] && END=$TOTAL_FILES
            
            echo "🚀 Uploading batch $BATCH_NUM [$((i+1))–${END} of $TOTAL_FILES]"
            
            # Add files in current batch
            for (( j=i; j<END; j++ )); do
              git add "${STAGED_FILES[$j]}"
            done
            
            git commit -m "chore: add YouTube content batch $BATCH_NUM [skip ci]"
            git pull --rebase origin "$BRANCH" || true
            git push origin "HEAD:$BRANCH"
            
            echo "✅ Batch $BATCH_NUM uploaded"
          done
          
          echo "🎉 All files successfully uploaded to $BRANCH"
